<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>UI Templates</title>
  <link rel="icon" type="image/svg+xml" href="https://d1fpc3.com/favicon.svg">
  <meta name="description" content="A specimen library of copy-paste UI components. Buttons, cards, heroes, inputs, loaders and text effects. Preview live, copy the code, paste it in.">
  <link rel="canonical" href="https://d1fpc3.com/templates/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://d1fpc3.com/templates/">
  <meta property="og:title" content="UI Templates">
  <meta property="og:description" content="A specimen library of copy-paste UI components. Preview live, copy the code, paste it in.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script async src="https://seenrank.com/pixel.js" data-sr-site="d19bf048-ec87-453a-aa7f-b264637a7360"></script>
  <style>
    /* ─────────────────────────────────────────────────────────
       d1fpc3.com/templates | specimen library
       Monochrome workbench. Cormorant display, mono utility.
       ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #0a0a0a;
      --muted: #666666;
      --line: #e5e5e5;
      --hover: #f5f5f5;
      --stage-light: #fafafa;
      --stage-dark: #0b0b0e;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --serif: 'Cormorant', Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --ease: cubic-bezier(0.77, 0, 0.175, 1);
    }

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    .shell {
      max-width: none;
      margin: 0 auto;
      padding: 0 clamp(1.25rem, 2.5vw, 3.5rem);
    }
    .masthead h1 { max-width: none; }

    /* ── Top bar ─────────────────────────────────────────── */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 0 0;
    }
    .top-home {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      transition: color 0.18s ease;
    }
    .top-home:hover { color: var(--ink); }
    .top-home .dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem;
      font-weight: 600;
      font-family: var(--sans);
      letter-spacing: 0.02em;
    }
    .top-back {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .top-back:hover { color: var(--ink); border-color: var(--ink); }
    .top-back .arr { transition: transform 0.18s ease; display: inline-block; }
    .top-back:hover .arr { transform: translateX(-3px); }

    /* ── Masthead ────────────────────────────────────────── */
    .masthead {
      padding: clamp(3rem, 7vw, 5.5rem) 0 clamp(2rem, 4vw, 3rem);
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--muted);
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }
    .eyebrow::before {
      content: '';
      width: 2rem;
      height: 1px;
      background: var(--ink);
    }
    .masthead h1 {
      font-family: var(--serif);
      font-weight: 600;
      font-size: clamp(3rem, 9vw, 5.4rem);
      line-height: 0.98;
      letter-spacing: 0.003em;
      max-width: 14ch;
    }
    .masthead h1 em {
      font-style: italic;
      font-weight: 500;
      color: var(--muted);
    }
    .mast-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      margin-top: 1.6rem;
      flex-wrap: wrap;
    }
    .mast-sub {
      color: var(--muted);
      font-size: 1rem;
      max-width: 44ch;
      text-wrap: balance;
    }
    .mast-stats {
      display: flex;
      gap: 1.75rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .mast-stats b {
      display: block;
      font-family: var(--serif);
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
      letter-spacing: 0;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.8rem 0;
    }
    .filters {
      position: relative;
      display: flex;
      gap: 0.15rem;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filters::-webkit-scrollbar { display: none; }
    .f-thumb {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--ink);
      border-radius: 999px;
      transition: left 0.38s var(--ease), width 0.38s var(--ease);
      z-index: 0;
    }
    .f-btn {
      position: relative;
      z-index: 1;
      border: none;
      background: transparent;
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.02em;
      color: var(--muted);
      padding: 0.5rem 0.95rem;
      border-radius: 999px;
      transition: color 0.25s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .f-btn .n { font-size: 0.62rem; opacity: 0.55; }
    .f-btn:hover { color: var(--ink); }
    .f-btn.on { color: #fff; }
    .search {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      flex: 0 1 220px;
      min-width: 130px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.25rem;
      transition: border-color 0.2s ease;
    }
    .search:focus-within { border-color: var(--ink); color: var(--ink); }
    .search svg { width: 14px; height: 14px; flex: none; }
    .search input {
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--ink);
      width: 100%;
    }
    .search input::placeholder { color: #999; }

    /* ── Grid ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(370px, 100%), 1fr));
      gap: 1.4rem;
      padding: 2.2rem 0 4rem;
    }
    .tcard {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, opacity 0.3s ease, transform 0.3s ease;
      animation: cardIn 0.5s var(--ease) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tcard:hover {
      border-color: #cfcfcf;
      box-shadow: 0 14px 40px -18px rgba(0, 0, 0, 0.16);
    }
    .tcard.wide { grid-column: span 2; }
    @media (max-width: 840px) { .tcard.wide { grid-column: span 1; } }
    .tcard.hide { display: none; }

    .stage {
      position: relative;
      background: var(--stage-light);
      border-bottom: 1px solid var(--line);
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
    }
    .stage iframe {
      display: block;
      width: 100%;
      flex: 1 1 auto;
      border: none;
      background: transparent;
    }
    .stage .tag {
      position: absolute;
      top: 0.8rem;
      left: 0.9rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(6px);
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      pointer-events: none;
      z-index: 2;
    }
    .stage.dark .tag {
      color: rgba(255, 255, 255, 0.65);
      background: rgba(15, 15, 18, 0.6);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .tmeta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1rem 0.85rem 1.15rem;
    }
    .tname {
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .tacts { display: flex; align-items: center; gap: 0.4rem; flex: none; }

    .code-btn {
      width: 36px; height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--muted);
      transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .code-btn svg { width: 15px; height: 15px; }
    .code-btn:hover { color: var(--ink); border-color: var(--ink); }
    .code-btn.on { background: var(--ink); border-color: var(--ink); color: #fff; }

    .copy-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      height: 36px;
      padding: 0 1rem;
      border: 1px solid var(--ink);
      border-radius: 10px;
      background: var(--ink);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      overflow: hidden;
      transition: transform 0.12s ease, background 0.25s ease, border-color 0.25s ease;
      min-width: 84px;
    }
    .copy-btn:hover::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      animation: copySheen 0.6s ease forwards;
    }
    @keyframes copySheen { to { left: 100%; } }
    .copy-btn:active { transform: scale(0.96); }
    .copy-btn svg { width: 13px; height: 13px; }
    .copy-btn.done { background: #0f8a3d; border-color: #0f8a3d; }

    .codepane {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s var(--ease);
      background: #0d0d10;
    }
    .codepane pre {
      margin: 0;
      padding: 1rem 1.15rem 1.2rem;
      max-height: 340px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.65;
      color: #d6d6dc;
      tab-size: 2;
    }
    .codepane pre::-webkit-scrollbar { width: 8px; height: 8px; }
    .codepane pre::-webkit-scrollbar-thumb { background: #2c2c33; border-radius: 4px; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
    }
    .empty .big {
      font-family: var(--sans);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }
    .empty p { font-family: var(--mono); font-size: 0.78rem; }

    /* ── Footer ──────────────────────────────────────────── */
    .foot {
      border-top: 1px solid var(--line);
      padding: 2.2rem 0 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--muted);
    }
    .foot a { border-bottom: 1px solid var(--line); padding-bottom: 1px; transition: color 0.18s ease, border-color 0.18s ease; }
    .foot a:hover { color: var(--ink); border-color: var(--ink); }

    @media (max-width: 640px) {
      .toolbar { flex-direction: column; align-items: stretch; gap: 0.7rem; padding-bottom: 0.9rem; }
      .search { flex: 1 1 auto; }
      .mast-stats b { font-size: 1.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="shell">
    <header class="top">
      <a class="top-home" href="https://d1fpc3.com/">
        <span class="dot">D1</span>
        d1fpc3.com
      </a>
      <a class="top-back" href="https://d1fpc3.com/"><span class="arr">&larr;</span> Home</a>
    </header>

    <section class="masthead">
      <p class="eyebrow">Specimen Library</p>
      <h1>UI Templates, <em>ready to paste</em></h1>
      <div class="mast-row">
        <p class="mast-sub">Every piece below is a self-contained snippet: styles, markup and script in one block. Preview it live, copy it, paste it into any page.</p>
        <div class="mast-stats">
          <span><b id="statCount">0</b>pieces</span>
          <span><b id="statCats">0</b>categories</span>
          <span><b>0</b>dependencies</span>
        </div>
      </div>
    </section>
  </div>

  <div class="toolbar-wrap">
    <div class="shell">
      <div class="toolbar">
        <nav class="filters" id="filters" aria-label="Filter templates">
          <span class="f-thumb" id="fThumb"></span>
        </nav>
        <label class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchBox" placeholder="Search pieces" aria-label="Search templates">
        </label>
      </div>
    </div>
  </div>

  <div class="shell">
    <main class="grid" id="grid"></main>

    <footer class="foot">
      <a href="https://d1fpc3.com/">d1fpc3.com</a>
    </footer>
  </div>

  <script>
  'use strict';

  /* ════════════════════════════════════════════════════════
     TEMPLATE REGISTRY
     Each entry: id, name, cat, dark (stage), fill (no center
     wrapper), h (preview px), code (the exact snippet copied).
     Snippets are fully self-contained: style + markup + script.
     ════════════════════════════════════════════════════════ */
  var T = [];

  /* ── BUTTONS ─────────────────────────────────────────── */

  T.push({ id: 'btn-shine', name: 'Shine Sweep Button', cat: 'Buttons', dark: true, h: 180, code:
'<style>\n' +
'.shine-btn {\n' +
'  position: relative;\n' +
'  overflow: hidden;\n' +
'  border: 1px solid rgba(255,255,255,0.14);\n' +
'  background: #111114;\n' +
'  color: #fff;\n' +
'  font: 500 15px/1 system-ui, sans-serif;\n' +
'  letter-spacing: 0.01em;\n' +
'  padding: 16px 34px;\n' +
'  border-radius: 12px;\n' +
'  cursor: pointer;\n' +
'  transition: transform 0.15s ease, border-color 0.25s ease;\n' +
'}\n' +
'.shine-btn::after {\n' +
'  content: "";\n' +
'  position: absolute;\n' +
'  top: 0; left: -120%;\n' +
'  width: 100%; height: 100%;\n' +
'  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.32), transparent);\n' +
'  transition: left 0.6s ease;\n' +
'}\n' +
'.shine-btn:hover { border-color: rgba(255,255,255,0.35); }\n' +
'.shine-btn:hover::after { left: 120%; }\n' +
'.shine-btn:active { transform: scale(0.96); }\n' +
'</style>\n' +
'<button class="shine-btn">Start my free trial</button>'
  });

  T.push({ id: 'btn-liquid', name: 'Liquid Fill Button', cat: 'Buttons', dark: true, h: 180, code:
'<style>\n' +
'.liquid-btn {\n' +
'  position: relative;\n' +
'  overflow: hidden;\n' +
'  z-index: 1;\n' +
'  background: transparent;\n' +
'  border: 1.5px solid #fff;\n' +
'  color: #fff;\n' +
'  font: 500 15px/1 system-ui, sans-serif;\n' +
'  padding: 16px 36px;\n' +
'  border-radius: 999px;\n' +
'  cursor: pointer;\n' +
'  transition: color 0.4s cubic-bezier(0.77, 0, 0.175, 1);\n' +
'}\n' +
'.liquid-btn::before {\n' +
'  content: "";\n' +
'  position: absolute;\n' +
'  inset: 0;\n' +
'  z-index: -1;\n' +
'  background: #fff;\n' +
'  transform: translateY(101%);\n' +
'  border-radius: 50% 50% 0 0;\n' +
'  transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1), border-radius 0.5s ease;\n' +
'}\n' +
'.liquid-btn:hover { color: #000; }\n' +
'.liquid-btn:hover::before { transform: translateY(0); border-radius: 0; }\n' +
'.liquid-btn:active { transform: scale(0.97); }\n' +
'</style>\n' +
'<button class="liquid-btn">Show me how</button>'
  });

  T.push({ id: 'btn-swap', name: 'Text Swap Button', cat: 'Buttons', dark: false, h: 180, code:
'<style>\n' +
'.swap-btn {\n' +
'  position: relative;\n' +
'  overflow: hidden;\n' +
'  height: 54px;\n' +
'  padding: 0 34px;\n' +
'  border: none;\n' +
'  border-radius: 12px;\n' +
'  background: #0a0a0a;\n' +
'  color: #fff;\n' +
'  font: 500 15px/1 system-ui, sans-serif;\n' +
'  cursor: pointer;\n' +
'}\n' +
'.swap-btn span {\n' +
'  display: flex;\n' +
'  align-items: center;\n' +
'  justify-content: center;\n' +
'  height: 100%;\n' +
'  transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1);\n' +
'}\n' +
'.swap-btn span:nth-child(2) {\n' +
'  position: absolute;\n' +
'  inset: 0;\n' +
'  transform: translateY(100%);\n' +
'}\n' +
'.swap-btn:hover span:nth-child(1) { transform: translateY(-100%); }\n' +
'.swap-btn:hover span:nth-child(2) { transform: translateY(0); }\n' +
'.swap-btn:active { transform: scale(0.97); }\n' +
'</style>\n' +
'<button class="swap-btn">\n' +
'  <span>Get started</span>\n' +
'  <span>Let’s go &rarr;</span>\n' +
'</button>'
  });

  T.push({ id: 'btn-3d', name: '3D Press Button', cat: 'Buttons', dark: false, h: 180, code:
'<style>\n' +
'.press-btn {\n' +
'  background: #0a0a0a;\n' +
'  color: #fff;\n' +
'  font: 600 15px/1 system-ui, sans-serif;\n' +
'  padding: 16px 36px;\n' +
'  border: none;\n' +
'  border-radius: 12px;\n' +
'  box-shadow: 0 6px 0 #3d3d3d;\n' +
'  cursor: pointer;\n' +
'  transition: transform 0.1s ease, box-shadow 0.1s ease;\n' +
'}\n' +
'.press-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #3d3d3d; }\n' +
'.press-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #3d3d3d; }\n' +
'</style>\n' +
'<button class="press-btn">Claim my spot</button>'
  });

  T.push({ id: 'btn-magnetic', name: 'Magnetic Button', cat: 'Buttons', dark: true, h: 200, code:
'<style>\n' +
'.mag-btn {\n' +
'  background: #fff;\n' +
'  color: #000;\n' +
'  font: 500 15px/1 system-ui, sans-serif;\n' +
'  padding: 18px 40px;\n' +
'  border: none;\n' +
'  border-radius: 999px;\n' +
'  cursor: pointer;\n' +
'  will-change: transform;\n' +
'}\n' +
'</style>\n' +
'<button class="mag-btn">Hover near me</button>\n' +
'<script>\n' +
'(function () {\n' +
'  var btn = document.querySelector(".mag-btn");\n' +
'  btn.addEventListener("mousemove", function (e) {\n' +
'    var r = btn.getBoundingClientRect();\n' +
'    var x = e.clientX - r.left - r.width / 2;\n' +
'    var y = e.clientY - r.top - r.height / 2;\n' +
'    btn.style.transition = "none";\n' +
'    btn.style.transform = "translate(" + x * 0.35 + "px, " + y * 0.35 + "px)";\n' +
'  });\n' +
'  btn.addEventListener("mouseleave", function () {\n' +
'    btn.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";\n' +

'}\n' +

'<div class="tilt-wrap">\n' +
'  <div class="tilt-card">\n' +
'    <span class="chip">Hover me</span>\n' +
'    <h3>Perspective tilt</h3>\n' +
'    <p>The card leans toward the cursor in 3D space. Subtle angles only, six degrees max.</p>\n' +
'  </div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var wrap = document.querySelector(".tilt-wrap");\n' +
'  var card = wrap.querySelector(".tilt-card");\n' +
'  wrap.addEventListener("mousemove", function (e) {\n' +
'    var r = wrap.getBoundingClientRect();\n' +

'  });\n' +
'  wrap.addEventListener("mouseleave", function () {\n' +

  T.push({ id: 'card-countdown', name: 'Countdown Timer', cat: 'Cards', dark: true, h: 240, code:
'<style>\n' +

'<div class="cdown">\n' +
'  <div class="cap">Launch in</div>\n' +
'  <div class="row">\n' +
'    <div class="cell"><b data-u="d">1</b><span>days</span></div>\n' +
'    <div class="cell"><b data-u="h">08</b><span>hours</span></div>\n' +
'    <div class="cell"><b data-u="m">24</b><span>mins</span></div>\n' +

'  </div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var target = Date.now() + 118 * 60 * 60 * 1000;\n' +
'  var cells = {};\n' +
'  document.querySelectorAll(".cdown [data-u]").forEach(function (el) { cells[el.dataset.u] = el; });\n' +
'  function pad(n) { return n < 10 ? "0" + n : "" + n; }\n' +
'  function set(el, v) {\n' +
'    if (el.textContent !== v) {\n' +
'      el.textContent = v;\n' +
'      el.classList.remove("tick");\n' +
'      void el.offsetWidth;\n' +

'    }\n' +
'  }\n' +
'  function update() {\n' +
'    var t = Math.max(0, target - Date.now());\n' +
'    set(cells.d, "" + Math.floor(t / 86400000));\n' +
'    set(cells.h, pad(Math.floor(t / 3600000) % 24));\n' +
'    set(cells.m, pad(Math.floor(t / 60000) % 60));\n' +
'    set(cells.s, pad(Math.floor(t / 1000) % 60));\n' +
'  }\n' +

'(function () {\n' +
'  var box = document.querySelector(".dvd");\n' +
'  var logo = box.querySelector(".logo");\n' +
'  var colors = ["#22d3ee", "#a855f7", "#4ade80", "#f59e0b", "#f43f5e", "#e2e8f0"];\n' +
'  var x = 30, y = 40, vx = 1.6, vy = 1.3, ci = 0;\n' +

'    if (hit) { ci = (ci + 1) % colors.length; logo.style.color = colors[ci]; }\n' +
'    logo.style.transform = "translate(" + x + "px, " + y + "px)";\n' +

'(function () {\n' +

'  function settle() {\n' +
'    var cards = deck.querySelectorAll(".sc");\n' +
'    cards.forEach(function (c, i) {\n' +
'      var fromTop = cards.length - 1 - i;\n' +

  T.push({ id: 'input-password', name: 'Password Strength', cat: 'Inputs', dark: false, h: 210, code:
'<style>\n' +
'.pw { width: 280px; font-family: system-ui, sans-serif; }\n' +
'.pw input {\n' +
'  width: 100%;\n' +
'  padding: 14px 16px;\n' +
'  font-size: 15px;\n' +
'  border: 1.5px solid #ddd;\n' +
'  border-radius: 12px;\n' +
'  outline: none;\n' +
'  transition: border-color 0.2s ease, box-shadow 0.2s ease;\n' +

'}\n' +
'.pw input:focus { border-color: #0a0a0a; box-shadow: 0 0 0 4px rgba(0,0,0,0.06); }\n' +
'.pw .meter { display: flex; gap: 6px; margin: 12px 0 7px; }\n' +
'.pw .meter i {\n' +
'  flex: 1;\n' +
'  height: 5px;\n' +
'  border-radius: 999px;\n' +
'  background: #ececef;\n' +
'  transition: background 0.3s ease;\n' +
'}\n' +
'.pw .hint { font-size: 12px; color: #999; min-height: 1em; transition: color 0.3s ease; }\n' +
'</style>\n' +
'<div class="pw">\n' +
'  <input type="password" placeholder="Choose a password" aria-label="Password">\n' +
'  <div class="meter"><i></i><i></i><i></i><i></i></div>\n' +
'  <div class="hint">Use 8+ characters with numbers and symbols</div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var wrap = document.querySelector(".pw");\n' +
'  var input = wrap.querySelector("input");\n' +
'  var bars = wrap.querySelectorAll(".meter i");\n' +
'  var hint = wrap.querySelector(".hint");\n' +
'  var levels = [\n' +
'    { c: "#ef4444", t: "Too weak" },\n' +
'    { c: "#f59e0b", t: "Getting there" },\n' +
'    { c: "#eab308", t: "Decent" },\n' +
'    { c: "#16a34a", t: "Strong password" }\n' +
'  ];\n' +
'  input.addEventListener("input", function () {\n' +
'    var v = input.value;\n' +
'    var score = 0;\n' +
'    if (v.length >= 8) score++;\n' +
'    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;\n' +
'    if (/\\d/.test(v)) score++;\n' +
'    if (/[^A-Za-z0-9]/.test(v)) score++;\n' +
'    bars.forEach(function (b, i) {\n' +
'      b.style.background = v && i < score ? levels[score - 1].c : "#ececef";\n' +
'    });\n' +
'    hint.textContent = v ? (score ? levels[score - 1].t : "Too weak") : "Use 8+ characters with numbers and symbols";\n' +
'    hint.style.color = v && score ? levels[score - 1].c : "#999";\n' +
'  });\n' +
'})();\n' +
'<\/script>'
  });

'}\n' +

'  <input type="text" placeholder="Add a tag, press Enter">\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var box = document.querySelector(".tags");\n' +
'  var input = box.querySelector("input");\n' +
'  box.addEventListener("click", function (e) {\n' +
'    if (e.target.tagName === "BUTTON") e.target.parentElement.remove();\n' +
'    else input.focus();\n' +
'  });\n' +
'  input.addEventListener("keydown", function (e) {\n' +

  T.push({ id: 'input-signature', name: 'Signature Pad', cat: 'Inputs', dark: false, h: 280, code:
'<style>\n' +

'  border: 1px solid #e2e2e6;\n' +

'}\n' +
'.sig button:hover { border-color: #0a0a0a; color: #0a0a0a; }\n' +
'</style>\n' +
'<div class="sig">\n' +
'  <canvas></canvas>\n' +
'  <div class="row"><span class="hint">Sign above</span><button>Clear</button></div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var wrap = document.querySelector(".sig");\n' +
'  var cv = wrap.querySelector("canvas");\n' +
'  var ctx = cv.getContext("2d");\n' +
'  function size() {\n' +
'    var r = cv.getBoundingClientRect();\n' +
'    cv.width = r.width * 2;\n' +
'    cv.height = r.height * 2;\n' +
'    ctx.scale(2, 2);\n' +
'    ctx.lineWidth = 2.2;\n' +
'    ctx.lineCap = "round";\n' +
'    ctx.lineJoin = "round";\n' +
'    ctx.strokeStyle = "#1a1a8c";\n' +
'  }\n' +
'  size();\n' +
'  var down = false;\n' +
'  function pos(e) {\n' +
'    var r = cv.getBoundingClientRect();\n' +
'    return { x: e.clientX - r.left, y: e.clientY - r.top };\n' +
'  }\n' +
'  cv.addEventListener("pointerdown", function (e) {\n' +
'    down = true;\n' +
'    cv.setPointerCapture(e.pointerId);\n' +
'    var p = pos(e);\n' +
'    ctx.beginPath();\n' +
'    ctx.moveTo(p.x, p.y);\n' +
'  });\n' +
'  cv.addEventListener("pointermove", function (e) {\n' +
'    if (!down) return;\n' +
'    var p = pos(e);\n' +
'    ctx.lineTo(p.x, p.y);\n' +
'    ctx.stroke();\n' +
'  });\n' +
'  cv.addEventListener("pointerup", function () { down = false; });\n' +
'  wrap.querySelector("button").addEventListener("click", function () {\n' +
'    ctx.clearRect(0, 0, cv.width, cv.height);\n' +
'  });\n' +
'})();\n' +
'<\/script>'
  });

'}\n' +

'}\n' +
'.drs-ticks { display: flex; justify-content: space-between; font-size: 11px; color: #9a9aa5; margin-top: 12px; }\n' +
'</style>\n' +
'<div class="drs">\n' +
'  <div class="drs-head"><span class="drs-label">Price range</span><span class="drs-val" id="drsVal"></span></div>\n' +
'  <div class="drs-track">\n' +
'    <div class="drs-fill" id="drsFill"></div>\n' +
'    <input type="range" id="drsMin" min="0" max="600" step="10" value="120">\n' +
'    <input type="range" id="drsMax" min="0" max="600" step="10" value="480">\n' +
'  </div>\n' +
'  <div class="drs-ticks"><span>$0</span><span>$600</span></div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var lo = document.getElementById("drsMin"), hi = document.getElementById("drsMax");\n' +
'  var fill = document.getElementById("drsFill"), val = document.getElementById("drsVal");\n' +
'  function sync(from) {\n' +
'    var a = +lo.value, b = +hi.value;\n' +
'    if (a > b - 20) {\n' +
'      if (from === lo) lo.value = b - 20; else hi.value = a + 20;\n' +

'    }\n' +

'  }\n' +
'  lo.addEventListener("input", function () { sync(lo); });\n' +

'})();\n' +

'(function () {\n' +

  T.push({ id: 'input-reorder', name: 'Drag to Reorder', cat: 'Inputs', dark: false, h: 340, code:
'<style>\n' +
'.rol { position: relative; width: 280px; height: 232px; font-family: system-ui, sans-serif; }\n' +
'.rol .it {\n' +
'  position: absolute;\n' +
'  left: 0; right: 0;\n' +

'}\n' +
'.rol .it.drag { transition: box-shadow 0.2s ease; box-shadow: 0 16px 34px -14px rgba(0,0,0,0.35); z-index: 5; cursor: grabbing; }\n' +
'.rol .grip { color: #ccc; cursor: grab; display: grid; gap: 3px; }\n' +
'.rol .grip i { display: block; width: 14px; height: 2px; border-radius: 1px; background: currentColor; }\n' +
'.rol .it b { font-size: 13.5px; font-weight: 600; color: #0a0a0a; flex: 1; }\n' +
'.rol .it small { font-size: 11px; color: #999; }\n' +
'</style>\n' +
'<div class="rol">\n' +
'  <div class="it"><span class="grip"><i></i><i></i><i></i></span><b>Hero section</b><small>1</small></div>\n' +
'  <div class="it"><span class="grip"><i></i><i></i><i></i></span><b>Feature grid</b><small>2</small></div>\n' +
'  <div class="it"><span class="grip"><i></i><i></i><i></i></span><b>Testimonials</b><small>3</small></div>\n' +
'  <div class="it"><span class="grip"><i></i><i></i><i></i></span><b>Footer CTA</b><small>4</small></div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var wrap = document.querySelector(".rol");\n' +
'  var items = Array.prototype.slice.call(wrap.querySelectorAll(".it"));\n' +
'  var ROW = 60;\n' +
'  var order = items.slice();\n' +
'  function layout(skip) {\n' +
'    order.forEach(function (el, i) {\n' +
'      if (el !== skip) el.style.transform = "translateY(" + i * ROW + "px)";\n' +
'      el.querySelector("small").textContent = i + 1;\n' +
'    });\n' +
'  }\n' +
'  items.forEach(function (el) {\n' +
'    var startY = 0, baseIdx = 0, down = false;\n' +
'    el.addEventListener("pointerdown", function (e) {\n' +
'      down = true;\n' +
'      startY = e.clientY;\n' +
'      baseIdx = order.indexOf(el);\n' +
'      el.classList.add("drag");\n' +
'      el.setPointerCapture(e.pointerId);\n' +
'    });\n' +
'    el.addEventListener("pointermove", function (e) {\n' +
'      if (!down) return;\n' +
'      var dy = e.clientY - startY;\n' +
'      el.style.transform = "translateY(" + (baseIdx * ROW + dy) + "px)";\n' +
'      var target = Math.max(0, Math.min(order.length - 1, Math.round((baseIdx * ROW + dy) / ROW)));\n' +
'      if (target !== order.indexOf(el)) {\n' +
'        order.splice(order.indexOf(el), 1);\n' +
'        order.splice(target, 0, el);\n' +
'        layout(el);\n' +
'      }\n' +
'    });\n' +
'    el.addEventListener("pointerup", function () {\n' +
'      if (!down) return;\n' +
'      down = false;\n' +
'      el.classList.remove("drag");\n' +
'      layout();\n' +
'    });\n' +
'  });\n' +
'  layout();\n' +
'})();\n' +
'<\/script>'
  });

  T.push({ id: 'nav-scrollprog', name: 'Scroll Progress Bar', cat: 'Nav', dark: false, h: 300, code:
'<style>\n' +
'.spb { position: relative; width: 330px; height: 230px; background: #fff; border: 1px solid #e8e8ee; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }\n' +
'.spb-bar { position: absolute; top: 0; left: 0; height: 3px; width: 0; background: linear-gradient(90deg, #ec4899, #a78bfa); z-index: 2; transition: width 0.08s linear; }\n' +
'.spb-scroll { height: 100%; overflow-y: auto; padding: 18px 22px; font: 13px/1.65 system-ui, sans-serif; color: #55555f; }\n' +
'.spb-scroll h4 { margin: 0 0 8px; font-size: 15px; color: #17171c; }\n' +
'.spb-scroll p { margin: 0 0 12px; }\n' +
'.spb-hint { font-size: 11px; color: #b3b3bd; text-align: center; padding-bottom: 6px; }\n' +
'</style>\n' +
'<div class="spb">\n' +
'  <div class="spb-bar" id="spbBar"></div>\n' +
'  <div class="spb-scroll" id="spbScroll">\n' +
'    <h4>How the bar works</h4>\n' +
'    <p>The gradient line along the top fills as you read. It maps scroll position to width, so readers always know how much is left.</p>\n' +
'    <p>On a real page you bind it to the window scroll instead of this little box, and it sits fixed above everything at the top of the viewport.</p>\n' +
'    <p>It works especially well on long-form posts, docs pages, and case studies where the scrollbar itself is far away or hidden.</p>\n' +
'    <p>Keep it thin. Two or three pixels reads as a quiet signal; anything thicker starts to compete with the navigation.</p>\n' +
'    <p class="spb-hint">Nice, you reached the end.</p>\n' +
'  </div>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var box = document.getElementById("spbScroll"), bar = document.getElementById("spbBar");\n' +
'  box.addEventListener("scroll", function () {\n' +
'    var max = box.scrollHeight - box.clientHeight;\n' +
'    bar.style.width = (max > 0 ? box.scrollTop / max * 100 : 0) + "%";\n' +
'  });\n' +
'})();\n' +
'<\/script>'
  });

  T.push({ id: 'nav-totop', name: 'Back to Top Button', cat: 'Nav', dark: false, h: 320, code:
'<style>\n' +
'.btt { position: relative; width: 330px; height: 250px; background: #fff; border: 1px solid #e8e8ee; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }\n' +
'.btt-scroll { height: 100%; overflow-y: auto; padding: 18px 22px; font: 13px/1.65 system-ui, sans-serif; color: #55555f; }\n' +
'.btt-scroll h4 { margin: 0 0 8px; font-size: 15px; color: #17171c; }\n' +
'.btt-scroll p { margin: 0 0 12px; }\n' +
'.btt-btn {\n' +
'  position: absolute;\n' +
'  right: 14px;\n' +
'  bottom: 14px;\n' +
'  width: 42px;\n' +
'  height: 42px;\n' +
'  border: none;\n' +
'  border-radius: 50%;\n' +
'  background: #17171c;\n' +
'  color: #fff;\n' +
'  cursor: pointer;\n' +
'  display: grid;\n' +
'  place-items: center;\n' +
'  opacity: 0;\n' +
'  transform: translateY(10px);\n' +
'  pointer-events: none;\n' +
'  transition: opacity 0.25s ease, transform 0.25s ease;\n' +
'  box-shadow: 0 6px 18px rgba(0,0,0,0.25);\n' +
'}\n' +
'.btt-btn.show { opacity: 1; transform: none; pointer-events: auto; }\n' +
'.btt-btn svg.arr { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }\n' +
'.btt-ring { position: absolute; inset: -3px; transform: rotate(-90deg); }\n' +
'.btt-ring circle { fill: none; stroke: #ec4899; stroke-width: 2.5; stroke-linecap: round; }\n' +
'</style>\n' +
'<div class="btt">\n' +
'  <div class="btt-scroll" id="bttScroll">\n' +
'    <h4>Scroll down a bit</h4>\n' +
'    <p>The round button fades in once you leave the top, and the pink ring around it fills with your reading progress.</p>\n' +
'    <p>Tapping it glides you back to the top. On a real page, bind the handlers to the window instead of this demo box.</p>\n' +
'    <p>Keep it out of the way in a corner, small enough to ignore, big enough to hit with a thumb on mobile.</p>\n' +
'    <p>It pairs nicely with the scroll progress bar for long articles and documentation pages.</p>\n' +
'    <p>That is the whole trick. Now tap it.</p>\n' +
'  </div>\n' +
'  <button class="btt-btn" id="bttBtn" aria-label="Back to top">\n' +
'    <svg class="btt-ring" viewBox="0 0 48 48"><circle id="bttRing" cx="24" cy="24" r="22.5" stroke-dasharray="141.4" stroke-dashoffset="141.4"/></svg>\n' +
'    <svg class="arr" viewBox="0 0 24 24"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>\n' +
'  </button>\n' +
'</div>\n' +
'<script>\n' +
'(function () {\n' +
'  var box = document.getElementById("bttScroll");\n' +
'  var btn = document.getElementById("bttBtn");\n' +
'  var ring = document.getElementById("bttRing");\n' +
'  var C = 141.4;\n' +
'  box.addEventListener("scroll", function () {\n' +
'    var max = box.scrollHeight - box.clientHeight;\n' +
'    var p = max > 0 ? box.scrollTop / max : 0;\n' +
'    btn.classList.toggle("show", box.scrollTop > 40);\n' +
'    ring.style.strokeDashoffset = C * (1 - p);\n' +
'  });\n' +
'  btn.addEventListener("click", function () { box.scrollTo({ top: 0, behavior: "smooth" }); });\n' +
'})();\n' +
'<\/script>'
  });

  T.push({ id: 'nav-tree', name: 'File Tree Explorer', cat: 'Nav', dark: true, h: 340, code:
'<style>\n' +

'.ftree summary {\n' +

'}\n' +
'.ftree summary::-webkit-details-marker { display: none; }\n' +

'.ftree summary::before {\n' +
'  content: "";\n' +

'  border-top: 4px solid transparent;\n' +

'}\n' +
'.ftree details[open] > summary::before { transform: rotate(90deg); }\n' +

'<script>\n' +
'(function () {\n' +
'  var el = document.querySelector(".scramble");\n' +
'  var target = el.dataset.text;\n' +
'  var glyphs = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&";\n' +
'  function run() {\n' +
'    var frame = 0;\n' +
'    var timer = setInterval(function () {\n' +
'      var out = "";\n' +
'      for (var i = 0; i < target.length; i++) {\n' +
'        if (target[i] === " ") { out += " "; continue; }\n' +
'        out += frame / 3 > i ? target[i] : glyphs[Math.floor(Math.random() * glyphs.length)];\n' +
'      }\n' +
'      el.textContent = out;\n' +
'      frame++;\n' +
'      if (frame / 3 > target.length) clearInterval(timer);\n' +
'    }, 32);\n' +
'  }\n' +
'  run();\n' +
'  setInterval(run, 4200);\n' +
'})();\n' +
'<\/script>'

  T.push({ id: 'sec-compare', name: 'Before / After Slider', cat: 'Sections', dark: true, fill: true, wide: true, h: 340, code:

'.cont textarea { min-height: 96px; margin-bottom: 14px; }\n' +
'.cont .send {\n' +
'  align-self: flex-start;\n' +
'  background: #0a0a0a;\n' +
'  color: #fff;\n' +
'  font: 600 13.5px/1 system-ui, sans-serif;\n' +
'  padding: 14px 30px;\n' +
'  border: none;\n' +
'  border-radius: 11px;\n' +
'  cursor: pointer;\n' +
'  transition: transform 0.15s ease, box-shadow 0.25s ease;\n' +
'}\n' +
'.cont .send:hover { transform: translateY(-2px); box-shadow: 0 12px 26px -12px rgba(0,0,0,0.45); }\n' +
'@media (max-width: 720px) { .cont { grid-template-columns: 1fr; } }\n' +
'</style>\n' +
'<section class="cont">\n' +
'  <div class="info">\n' +
'    <h2>Tell us about the project</h2>\n' +
'    <p>Replies within one business day. Straight answers, no discovery-call theatre.</p>\n' +
'    <div class="line2"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>hello@apex.dev</div>\n' +
'    <div class="line2"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>Sydney, Australia</div>\n' +
'    <div class="line2"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mon to Fri, 9 to 5 AEST</div>\n' +
'  </div>\n' +
'  <form class="formside" action="https://example.com/contact" method="post">\n' +
'    <div class="frow">\n' +
'      <input type="text" name="name" placeholder="Your name" aria-label="Name" required>\n' +
'      <input type="email" name="email" placeholder="you@company.com" aria-label="Email" required>\n' +
'    </div>\n' +
'    <textarea name="message" placeholder="What are we building?" aria-label="Message" required></textarea>\n' +
'    <button class="send" type="submit">Send message &rarr;</button>\n' +
'  </form>\n' +
'</section>'
  });

  T.push({ id: 'sec-vs', name: 'Us vs Them Table', cat: 'Sections', dark: false, fill: true, wide: true, h: 380, code:
'<style>\n' +
'.vs {\n' +
'  min-height: 380px;\n' +
'  display: grid;\n' +
'  place-items: center;\n' +
'  background: #fafafa;\n' +
'  padding: 40px 24px;\n' +
'  font-family: system-ui, sans-serif;\n' +
'}\n' +
'.vs .in { width: min(560px, 100%); }\n' +
'.vs h2 { margin: 0 0 20px; text-align: center; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: #0a0a0a; }\n' +
'.vs table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ececef; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px -18px rgba(0,0,0,0.12); }\n' +
'.vs th, .vs td { padding: 13px 18px; font-size: 13.5px; text-align: center; border-bottom: 1px solid #f4f4f6; }\n' +
'.vs td:first-child, .vs th:first-child { text-align: left; color: #333; }\n' +
'.vs tr:last-child td { border-bottom: none; }\n' +
'.vs th { font: 600 12px/1 system-ui, sans-serif; color: #999; text-transform: uppercase; letter-spacing: 0.06em; background: #fbfbfc; }\n' +
'.vs th.us { color: #0a0a0a; }\n' +
'.vs td.us { background: #f7f7ff; }\n' +
'.vs .yes, .vs .no {\n' +
'  display: inline-grid;\n' +
'  place-items: center;\n' +
'  width: 22px; height: 22px;\n' +
'  border-radius: 50%;\n' +
'}\n' +
'.vs .yes { background: #dcfce7; }\n' +
'.vs .no { background: #f4f4f6; }\n' +
'.vs .yes svg { width: 12px; height: 12px; stroke: #16a34a; stroke-width: 3; }\n' +
'.vs .no svg { width: 11px; height: 11px; stroke: #bbb; stroke-width: 2.5; }\n' +
'</style>\n' +
'<section class="vs">\n' +
'  <div class="in">\n' +
'    <h2>Why teams switch</h2>\n' +
'    <table>\n' +
'      <tr><th>Feature</th><th class="us">d1kit</th><th>Others</th></tr>\n' +
'      <tr><td>No build step</td><td class="us"><span class="yes"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td><td><span class="no"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span></td></tr>\n' +
'      <tr><td>Copy-paste ready</td><td class="us"><span class="yes"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td><td><span class="no"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span></td></tr>\n' +
'      <tr><td>Works without a framework</td><td class="us"><span class="yes"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td><td><span class="no"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span></td></tr>\n' +
'      <tr><td>Vendor lock-in</td><td class="us"><span class="no"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span></td><td><span class="yes"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td></tr>\n' +
'    </table>\n' +
'  </div>\n' +
'</section>'
  });

  /* ════════════════════════════════════════════════════════
     RENDER + INTERACTIONS
     ════════════════════════════════════════════════════════ */

  var grid = document.getElementById('grid');
  var CATS = ['All'];
  T.forEach(function (t) { if (CATS.indexOf(t.cat) === -1) CATS.push(t.cat); });

  document.getElementById('statCount').textContent = T.length;
  document.getElementById('statCats').textContent = CATS.length - 1;

  /* Build preview document from the exact snippet string. */
  function previewDoc(t) {
    var bg = t.dark ? '#0b0b0e' : '#fafafa';
    var dot = t.dark ? 'rgba(255,255,255,0.07)' : '#e3e3e6';
    var center = t.fill
      ? 'html,body{height:100%}body{margin:0;display:grid;align-content:center;overflow:hidden;background-color:' + bg + '}'
      : 'html,body{height:100%}body{margin:0;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;' +
        'background-color:' + bg + ';' +
        'background-image:radial-gradient(circle,' + dot + ' 1px,transparent 1px);background-size:18px 18px;}';
    return '<!doctype html><html><head><meta charset="utf-8"><style>' +
      '*{box-sizing:border-box}' + center +
      '</style></head><body>' + t.code + '</body></html>';
  }

  var ICON_CODE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
  var ICON_COPY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>';
  var ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  T.forEach(function (t, i) {
    var card = document.createElement('article');
    card.className = 'tcard' + (t.wide ? ' wide' : '');
    card.dataset.cat = t.cat;
    card.dataset.name = t.name.toLowerCase();
    card.style.animationDelay = Math.min(i * 0.04, 0.5) + 's';

    var stage = document.createElement('div');
    stage.className = 'stage' + (t.dark ? ' dark' : '');
    var tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = t.cat;
    var frame = document.createElement('iframe');
    frame.style.minHeight = t.h + 'px';
    frame.setAttribute('title', t.name + ' preview');
    frame.setAttribute('loading', 'lazy');
    frame.dataset.doc = 'pending';
    stage.appendChild(tag);
    stage.appendChild(frame);

    var meta = document.createElement('div');
    meta.className = 'tmeta';
    var name = document.createElement('h2');
    name.className = 'tname';
    name.textContent = t.name;
    var acts = document.createElement('div');
    acts.className = 'tacts';

    var codeBtn = document.createElement('button');
    codeBtn.className = 'code-btn';
    codeBtn.innerHTML = ICON_CODE;
    codeBtn.setAttribute('aria-label', 'View code for ' + t.name);

    var copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = ICON_COPY + '<span>Copy</span>';
    copyBtn.setAttribute('aria-label', 'Copy code for ' + t.name);

    acts.appendChild(codeBtn);
    acts.appendChild(copyBtn);
    meta.appendChild(name);
    meta.appendChild(acts);

    var pane = document.createElement('div');
    pane.className = 'codepane';
    var pre = document.createElement('pre');
    var codeEl = document.createElement('code');
    codeEl.textContent = t.code;
    pre.appendChild(codeEl);
    pane.appendChild(pre);

    codeBtn.addEventListener('click', function () {
      var open = pane.style.maxHeight && pane.style.maxHeight !== '0px';
      pane.style.maxHeight = open ? '0px' : pane.scrollHeight + 'px';
      codeBtn.classList.toggle('on', !open);
    });

    copyBtn.addEventListener('click', function () {
      var done = function () {
        copyBtn.classList.add('done');
        copyBtn.innerHTML = ICON_CHECK + '<span>Copied</span>';
        setTimeout(function () {
          copyBtn.classList.remove('done');
          copyBtn.innerHTML = ICON_COPY + '<span>Copy</span>';
        }, 1600);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(t.code).then(done, function () { legacyCopy(t.code); done(); });
      } else {
        legacyCopy(t.code);
        done();
      }
    });

    card.appendChild(stage);
    card.appendChild(meta);
    card.appendChild(pane);
    grid.appendChild(card);

    frame._doc = previewDoc(t);
  });

  function legacyCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  /* Windowed previews: boot iframes near the viewport, unload them when
     they leave. Booting once and never unloading accumulates every live
     iframe while scrolling and blows iOS Safari's per-tab memory cap. */
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (en) {
      var f = en.target;
      if (en.isIntersecting) {
        if (f.dataset.doc !== 'live') {
          f.srcdoc = f._doc;
          f.dataset.doc = 'live';
        }
      } else if (f.dataset.doc === 'live') {
        f.removeAttribute('srcdoc');
        f.dataset.doc = 'pending';
      }
    });
  }, { rootMargin: '600px 0px' });
  document.querySelectorAll('.stage iframe').forEach(function (f) { io.observe(f); });

  /* ── Filters ─────────────────────────────────────────── */
  var filters = document.getElementById('filters');
  var thumb = document.getElementById('fThumb');
  var active = 'All';
  var query = '';

  CATS.forEach(function (c) {
    var count = c === 'All' ? T.length : T.filter(function (t) { return t.cat === c; }).length;
    var b = document.createElement('button');
    b.className = 'f-btn' + (c === 'All' ? ' on' : '');
    b.innerHTML = c + ' <span class="n">' + count + '</span>';
    b.dataset.cat = c;
    b.addEventListener('click', function () {
      active = c;
      filters.querySelectorAll('.f-btn').forEach(function (x) { x.classList.toggle('on', x === b); });
      moveThumb(b);
      apply();
    });
    filters.appendChild(b);
  });

  function moveThumb(el) {
    thumb.style.left = el.offsetLeft + 'px';
    thumb.style.width = el.offsetWidth + 'px';
  }

  function apply() {
    var shown = 0;
    document.querySelectorAll('.tcard').forEach(function (c) {
      var ok = (active === 'All' || c.dataset.cat === active) &&
               (!query || c.dataset.name.indexOf(query) !== -1);
      c.classList.toggle('hide', !ok);
      if (ok) shown++;
    });
    var empty = document.getElementById('emptyState');
    if (!shown) {
      if (!empty) {
        empty = document.createElement('div');
        empty.className = 'empty';
        empty.id = 'emptyState';
        empty.innerHTML = '<div class="big">Nothing here</div><p>No pieces match that search. Clear it and browse.</p>';
        grid.appendChild(empty);
      }
    } else if (empty) {
      empty.remove();
    }
  }

  document.getElementById('searchBox').addEventListener('input', function (e) {
    query = e.target.value.trim().toLowerCase();
    apply();
  });

  /* Position thumb once fonts settle. */
  requestAnimationFrame(function () {
    var first = filters.querySelector('.f-btn.on');
    if (first) moveThumb(first);
  });
  window.addEventListener('resize', function () {
    var on = filters.querySelector('.f-btn.on');
    if (on) moveThumb(on);
  });
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () {
      var on = filters.querySelector('.f-btn.on');
      if (on) moveThumb(on);
    });
  }
  </script>
</body>
</html>
