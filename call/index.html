<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Book a call | D1FPC3</title>
  <meta name="description" content="Grab a time to talk through your project, your site, or what you're building. Pick a slot that works for you.">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="canonical" href="https://d1fpc3.com/call">
  <meta name="theme-color" content="#f4f1ea">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://d1fpc3.com/call">
  <meta property="og:title" content="Book a call | D1FPC3">
  <meta property="og:description" content="Grab a time to talk through your project, your site, or what you're building.">
  <meta property="og:image" content="https://d1fpc3.com/preview.png">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Book a call | D1FPC3">
  <meta name="twitter:description" content="Grab a time to talk through your project, your site, or what you're building.">
  <meta name="twitter:image" content="https://d1fpc3.com/preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- SeenRank Pixel -->
  <script async src="https://seenrank.com/pixel.js" data-sr-site="d19bf048-ec87-453a-aa7f-b264637a7360"></script>
  <script>
    // One-shot: kill any stale service worker + caches from prior deploys
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
      if (window.caches) caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
    }
  </script>
  <style>
    :root {
      /* Same warm paper + blue-violet accent as the /ai landing page. */
      --paper:      oklch(0.972 0.008 83);
      --paper-2:    oklch(0.945 0.010 83);
      --ink:        oklch(0.235 0.012 70);
      --ink-soft:   oklch(0.46 0.018 70);
      --ink-faint:  oklch(0.62 0.014 75);
      --accent:     oklch(0.55 0.155 266);
      --accent-deep: oklch(0.46 0.16 270);
      --warm:       oklch(0.74 0.13 62);
      --line:       oklch(0.235 0.012 70 / 0.10);
      --line-2:     oklch(0.235 0.012 70 / 0.16);
      --glass-bg:   oklch(1 0 0 / 0.55);
      --glass-rim:  oklch(1 0 0 / 0.75);
      --glass-shadow: 0 1px 2px oklch(0.235 0.012 70 / 0.06),
                      0 18px 50px oklch(0.46 0.16 270 / 0.12),
                      0 8px 20px oklch(0.235 0.012 70 / 0.06);
      --radius: 22px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--ink);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      position: relative;
      background: var(--paper);
      min-height: 100vh;
    }

    /* Ambient mesh backdrop (the glass refracts it). No grain overlay. */
    .bg-mesh {
      position: fixed;
      inset: -10%;
      z-index: -2;
      background:
        radial-gradient(40% 32% at 16% 10%, oklch(0.62 0.15 266 / 0.28), transparent 60%),
        radial-gradient(38% 30% at 86% 16%, oklch(0.70 0.13 300 / 0.22), transparent 60%),
        radial-gradient(46% 38% at 72% 88%, oklch(0.78 0.12 62 / 0.22), transparent 62%),
        radial-gradient(42% 36% at 22% 90%, oklch(0.66 0.13 240 / 0.16), transparent 62%);
      filter: saturate(1.08);
      animation: drift 26s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0%   { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(-2%, 1.5%, 0) scale(1.06); }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-mesh { animation: none; }
      .reveal { transition: none; }
    }

    ::selection { background: oklch(0.55 0.155 266 / 0.22); }
    a { color: inherit; }

    .wrap { width: 100%; max-width: 1040px; margin: 0 auto; padding: 0 24px; }

    /* Reveal on scroll */
    .reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.7s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1); }
    .reveal.in { opacity: 1; transform: none; }

    /* Page shell */
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 48px;
      align-items: center;
      padding: 56px 0;
    }
    @media (max-width: 880px) {
      .page { grid-template-columns: 1fr; gap: 30px; padding: 40px 0; }
      .copy { text-align: center; }
      .cta-row { justify-content: center; }
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700;
      color: var(--accent-deep);
      padding: 8px 15px 8px 12px;
      border-radius: 999px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-rim);
      -webkit-backdrop-filter: blur(10px) saturate(1.4);
      backdrop-filter: blur(10px) saturate(1.4);
      box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.7);
      margin-bottom: 22px;
    }
    .eyebrow .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px oklch(0.55 0.155 266 / 0.16);
    }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.6rem, 6vw, 4.1rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }
    h1 em { font-style: italic; color: var(--accent-deep); }

    .lead {
      font-size: 1.12rem;
      color: var(--ink-soft);
      max-width: 30ch;
      margin-bottom: 26px;
    }
    @media (max-width: 880px) { .lead { max-width: none; margin-left: auto; margin-right: auto; } }

    .points { list-style: none; display: grid; gap: 12px; margin-bottom: 30px; max-width: 32ch; }
    @media (max-width: 880px) { .points { max-width: none; } }
    .points li { display: flex; align-items: center; gap: 12px; font-size: 1rem; color: var(--ink); }
    @media (max-width: 880px) { .points li { justify-content: center; } }
    .check {
      flex: none; width: 24px; height: 24px; border-radius: 7px;
      background: linear-gradient(180deg in oklch, oklch(0.62 0.15 266 / 0.18), oklch(0.55 0.155 266 / 0.10));
      border: 1px solid oklch(0.55 0.155 266 / 0.30);
      display: grid; place-items: center;
      box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.6);
    }
    .check svg { width: 13px; height: 13px; stroke: var(--accent-deep); }

    .cta-row { display: flex; align-items: center; gap: 12px; }
    .home-link {
      font-size: 0.92rem; font-weight: 600; color: var(--ink-faint); text-decoration: none;
      transition: color 0.18s ease;
    }
    .home-link:hover { color: var(--accent-deep); }

    /* Glass card holding the booking widget */
    .glass {
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-rim);
      border-top-color: oklch(1 0 0 / 0.9);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      backdrop-filter: blur(14px) saturate(1.6);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
      overflow: hidden;
    }
    .glass::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
      background: linear-gradient(133deg, oklch(1 0 0 / 0.55), transparent 38%);
      mix-blend-mode: overlay;
    }
    .booking-card { padding: 14px; }
    .booking-card iframe {
      display: block;
      width: 100%;
      height: 680px;
      border: 0;
      border-radius: 16px;
      background: transparent;
    }
    @media (max-width: 880px) {
      .booking-card iframe { height: 640px; }
    }

    @media (prefers-reduced-transparency: reduce) {
      .glass, .eyebrow { -webkit-backdrop-filter: none; backdrop-filter: none; background: oklch(1 0 0 / 0.92); }
    }
  </style>
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"></div>

  <main class="wrap">
    <div class="page">
      <section class="copy">
        <span class="eyebrow reveal"><span class="dot"></span> Book a call</span>
        <h1 class="reveal">Let's talk through <em>what you're building</em>.</h1>
        <p class="lead reveal">Pick a time that works for you. Thirty minutes, no pressure, on your project, your site, or whatever you're stuck on.</p>
        <ul class="points reveal">
          <li><span class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span> Slots shown in your timezone</li>
          <li><span class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span> Instant confirmation by email</li>
          <li><span class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span> Reschedule any time, just reply</li>
        </ul>
        <div class="cta-row reveal">
          <a class="home-link" href="/">&larr; Back to d1fpc3.com</a>
        </div>
      </section>

      <aside class="reveal">
        <div class="glass booking-card">
          <!-- Booking widget. All logic lives on SeenRank; this is just the embed. -->
          <iframe
            src="https://seenrank.com/book/d1-call?embed=1"
            title="Book a call with D1"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </aside>
    </div>
  </main>

  <script>
    // Reveal-on-scroll, same pattern as the /ai landing page.
    (function () {
      var els = document.querySelectorAll('.reveal');
      if (!('IntersectionObserver' in window)) {
        els.forEach(function (el) { el.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      els.forEach(function (el, i) {
        el.style.transitionDelay = (i * 60) + 'ms';
        io.observe(el);
      });
    })();
  </script>
</body>
</html>
